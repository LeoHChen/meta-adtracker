name: Weekly Meta Ads → Notion Sync

# Runs every Friday and can also be triggered by hand from the Actions tab.
#
# NOTE: GitHub only runs scheduled workflows from the repository's DEFAULT
# branch, so this must be merged to the default branch before the cron fires.
# Scheduled runs can also be delayed several minutes during peak load.
on:
  schedule:
    # 15:00 UTC every Friday (≈ 10am US-Eastern / 7am US-Pacific). Cron is UTC.
    - cron: "0 15 * * 5"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to include in the window (ending yesterday)"
        required: false
        default: "7"
      dry_run:
        description: "Dry run: print metrics, do not write to Notion"
        type: boolean
        required: false
        default: false

# Avoid overlapping runs if a manual trigger coincides with the schedule.
concurrency:
  group: meta-ads-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly sync
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: ${{ vars.META_API_VERSION || 'v21.0' }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m src.sync
